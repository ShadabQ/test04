version: '3.8'

services:
  keycloak:
    image: keycloak/keycloak:latest
    container_name: keycloak-demo
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: 'false'
      KC_DB: dev-file
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    command: start-dev
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge

volumes:
  keycloak_data:
