# ============================================================================
# Local Keycloak Profile Configuration (Docker)
# ============================================================================
# Use this profile to run with local Keycloak via Docker
#
# Setup: docker run -d -p 8180:8080 -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD=admin keycloak/keycloak:latest start-dev
#
# Run with: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=local"
# ============================================================================

spring.application.name=Spring Boot Demo
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ============================================================================
# LOCAL KEYCLOAK CONFIGURATION (Docker)
# ============================================================================

keycloak.enabled=false
keycloak.realm=demo
keycloak.auth-server-url=http://localhost:8180
keycloak.ssl-required=none
keycloak.resource=springboot-demo
keycloak.credentials.secret=keycloak-secret
keycloak.use-resource-role-mappings=true

# Spring Security OAuth2 Resource Server (for JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.keycloak=DEBUG
logging.level.org.springframework.security=DEBUG
