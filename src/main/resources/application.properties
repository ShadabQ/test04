spring.application.name=Spring Boot Demo
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ============================================================================
# KEYCLOAK CONFIGURATION
# ============================================================================
# Set to 'true' to enable Keycloak, 'false' to use in-memory authentication
keycloak.enabled=false

# OPTION 1: Local Keycloak (via Docker)
# Steps:
# 1. docker run -d -p 8180:8080 -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD=admin keycloak/keycloak:latest start-dev
# 2. Access http://localhost:8180 and create realm/client
# 3. Update properties below
#keycloak.enabled=true
#keycloak.realm=demo
#keycloak.auth-server-url=http://localhost:8180
#keycloak.ssl-required=none
#keycloak.resource=springboot-app
#keycloak.credentials.secret=YOUR_CLIENT_SECRET
#keycloak.use-resource-role-mappings=true
keycloak.auth-server-url=http://localhost:8180

# OPTION 2: Cloud Hosted (Keycloak.cloud)
# 1. Sign up at https://www.keycloak.cloud
# 2. Create organization and realm
# 3. Create OpenID Connect client
# 4. Update properties below
#keycloak.enabled=true
#keycloak.realm=YOUR_REALM
#keycloak.auth-server-url=https://your-instance.keycloak.cloud
#keycloak.ssl-required=external
#keycloak.resource=YOUR_CLIENT_ID
#keycloak.credentials.secret=YOUR_CLIENT_SECRET
#keycloak.use-resource-role-mappings=true

# Spring Security OAuth2 Resource Server (for JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm:demo}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm:demo}/protocol/openid-connect/certs

# ============================================================================
# FALLBACK IN-MEMORY AUTHENTICATION (when keycloak.enabled=false)
# ============================================================================
spring.security.user.name=user
spring.security.user.password=password

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.keycloak=DEBUG
