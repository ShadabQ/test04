# ============================================================================
# Keycloak.cloud Profile Configuration
# ============================================================================
# Use this profile to run with Keycloak.cloud hosted identity provider
# 
# Setup Instructions: See KEYCLOAK_SETUP.md
#
# Run with: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=keycloak"
# ============================================================================

spring.application.name=Spring Boot Demo
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ============================================================================
# KEYCLOAK CONFIGURATION FOR KEYCLOAK.CLOUD
# ============================================================================

keycloak.enabled=true
keycloak.realm=YOUR_REALM_NAME
keycloak.auth-server-url=https://YOUR_INSTANCE.keycloak.cloud
keycloak.ssl-required=external
keycloak.resource=springboot-demo
keycloak.credentials.secret=YOUR_CLIENT_SECRET
keycloak.use-resource-role-mappings=true

# Spring Security OAuth2 Resource Server (for JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.keycloak=DEBUG
logging.level.org.springframework.security=DEBUG
